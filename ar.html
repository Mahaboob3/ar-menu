<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Experience</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; }
        model-viewer { width: 100vw; height: 100vh; background: #eee; }
        
        /* Premium Overlay UI */
        .ui-overlay { position: absolute; bottom: 40px; left: 5%; width: 90%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); box-sizing: border-box; text-align: center; }
        .ui-overlay h2 { margin: 0; font-size: 20px; }
        .ui-overlay p { margin: 5px 0 15px; color: #636e72; }
        
        .order-btn { background: #ff4757; color: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; text-decoration: none; display: inline-block; width: 80%; }
        .back-link { display: block; margin-top: 15px; color: #636e72; text-decoration: none; font-size: 13px; }

        #ar-button { background: #2ed573; color: white; border: none; padding: 15px 25px; border-radius: 50px; position: absolute; top: 30px; left: 50%; transform: translateX(-50%); font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <model-viewer id="viewer" src="" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1">
        <button slot="ar-button" id="ar-button">✨ VIEW IN YOUR SPACE</button>
        
        <div class="ui-overlay">
            <h2 id="display-name">Food Item</h2>
            <p id="display-price">$0.00</p>
            <a href="#" class="order-btn" onclick="alert('Order sent to kitchen!')">ORDER THIS DISH</a>
            <a href="index.html" class="back-link">← Back to Menu</a>
        </div>
    </model-viewer>

    <script>
        // Get details from the URL
        const params = new URLSearchParams(window.location.search);
        document.getElementById('viewer').src = params.get('item') + '.glb';
        document.getElementById('display-name').innerText = params.get('name');
        document.getElementById('display-price').innerText = params.get('price');
    </script>
</body>
</html>
