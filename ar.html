<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Food Viewer</title>
    <!-- Import the magic Google Model-Viewer component -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #eee; font-family: sans-serif; }
        .container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        model-viewer { width: 100%; height: 80%; background-color: #ffffff; }
        .controls { height: 20%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .btn-back { margin-top: 10px; color: #ff4757; text-decoration: none; font-weight: bold; }
        #dish-name { font-size: 24px; font-weight: bold; margin: 0; }
    </style>
</head>
<body>

    <div class="container">
        <!-- The 3D Viewer -->
        <model-viewer 
            id="food-model"
            src="" 
            ar 
            ar-modes="webxr scene-viewer quick-look" 
            camera-controls 
            auto-rotate 
            shadow-intensity="1"
            alt="A 3D food model">
            
            <button slot="ar-button" style="background-color: #2ed573; border-radius: 8px; border: none; position: absolute; top: 20px; right: 20px; padding: 10px 20px; color: white; font-weight: bold;">
                👋 PLACE ON YOUR TABLE
            </button>
        </model-viewer>

        <div class="controls">
            <h1 id="dish-name">Loading...</h1>
            <a href="index.html" class="btn-back">← Back to Menu</a>
        </div>
    </div>

    <script>
        // 1. Get the item name from the URL (e.g., ar.html?item=burger)
        const urlParams = new URLSearchParams(window.location.search);
        const item = urlParams.get('item');

        const modelViewer = document.getElementById('food-model');
        const dishTitle = document.getElementById('dish-name');

        // 2. Change the 3D model based on what the user clicked
        if (item === 'burger') {
            modelViewer.src = 'burger.glb';
            dishTitle.innerText = 'Classic Burger';
        } else if (item === 'pizza') {
            modelViewer.src = 'pizza.glb';
            dishTitle.innerText = 'Pepperoni Pizza';
        } else {
            dishTitle.innerText = 'Item Not Found';
        }
    </script>
</body>
</html>
